name: Remote Deployment  
 
on:
  push:      
    branches:    
      - main
env:  
 Region: ap-south-1
 name: java-eks-demo
 clustername: my-eks-cluster  

jobs:  
  terraform:
    runs-on: ubuntu-latest 
    
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v2
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
         distribution: temurin
         java-version: 17

      - name: Build with Maven
        run: mvn clean package

      
      - name: SonarQube Scan
        run: |
          mvn clean verify sonar:sonar \
          -Dsonar.projectKey=maven \
          -Dsonar.host.url=http://65.0.185.125:9000 \
          -Dsonar.login=${{ secrets.SONAR_TOKEN }}    
        continue-on-error: true
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v1
        with:
          terraform_version: "1.3.7"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:  ${{ env.Region }}

      - name: init
        run: terraform init

      - name: plan
        run: terraform plan

      - name: apply
        run: terraform destroy -auto-approve

      - name: Install Trivy
        run: |
         sudo apt-get install wget apt-transport-https gnupg lsb-release -y
         wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
         echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee /etc/apt/sources.list.d/trivy.list
         sudo apt-get update
         sudo apt-get install trivy -y  

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1
        
      - name: repo check
        run: aws ecr create-repository --repository-name ${{ env.name }}  --region ${{ env.Region }}
        continue-on-error: true

        

      - name: build
        run:  docker build -t ${{ env.name }} .
      - name: scan docker image with trivy
        run: trivy image --format json -o trivy-report.json java-eks-demo
        

      - name: tag
        run: docker tag java-eks-demo:latest 748716953870.dkr.ecr.${{ env.Region }}.amazonaws.com/${{ env.name }}:latest
           
      - name: push    
        run:  docker push 748716953870.dkr.ecr.${{ env.Region }}.amazonaws.com/${{ env.name }}:latest

      - name: update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.clustername }}    --region ${{ env.Region }} 

      

      - name: deploy 
        run: kubectl apply -f deployment.yaml
      - name: pods
        run: kubectl get pods

      

        
    



      
      

      
      

      

      

        


      

      
        

        

        

      
